# ============================================================================
# LoRA 微调配置 - 文本生成/对话场景
# 技术要点: 在模型的注意力层插入低秩分解矩阵, 仅训练新增参数，面试要点: LoRA通过 W' = W + BA (B∈R^{d×r}, A∈R^{r×k}) 实现参数高效微调
# ============================================================================

model:
  model_name_or_path: "Qwen/Qwen2.5-0.5B-Instruct"
  model_type: "causal_lm"
  torch_dtype: "bf16"
  trust_remote_code: true

tokenizer:
  max_length: 256
  padding: "longest"

data:
  # 使用Alpaca格式的指令数据集
  dataset_name: "tatsu-lab/alpaca"
  template: "alpaca"  # 数据模板: alpaca, sharegpt, custom
  max_samples: 1000  # 限制样本数 (用于快速实验)

training:
  output_dir: "outputs/models/lora-chat"
  num_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  fp16: true
  bf16: false
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  dataloader_num_workers: 0

finetuning:
  method: "lora"
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    bias: "none"
    task_type: "CAUSAL_LM"

logging:
  log_dir: "outputs/logs/lora-chat"
  use_tensorboard: true
